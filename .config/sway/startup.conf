# Background services
# exec_always "pkill kanshi; kanshi"
# exec gammastep -O 4500
exec "gammastep -l '32.7:-117.1'"

# Notifications
exec mako --font="Hack Nerd Font 8"

# Tray stuff
exec nm-applet

# Lockscreen + Suspend
exec systemd-inhibit --what=handle-power-key sleep infinity

exec swayidle -w \
    timeout 300 'gtklock -d' \
    timeout 600 'swaymsg "output * power off"' resume 'swaymsg "output * power on"' \
    before-sleep 'gtklock -d'

# Wallpaper
#output * bg ~/Img/wallpaper fill
exec awww-daemon

exec waybar
