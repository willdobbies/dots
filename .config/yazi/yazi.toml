[mgr]
ratio = [1, 3, 4]
mouse_events= []
linemode = "size"

[plugin]
prepend_fetchers = [
    {id = "git", url = "*", run  = "git", group="git"},
    {id = "git", url = "*/", run  = "git", group="git"},
]

[[open.prepend_rules]]
url = "bulk-rename.txt"
use = "bulk-rename"

[[opener.bulk-rename]]
block = true
run   = "nvim %s; ya exec bulk_exit %s --accept"
